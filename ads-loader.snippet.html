<!-- 애드센스 승인 후 public/index.html의 "광고 로더 비활성화" 스크립트 블록을 아래 내용으로 통째로 교체 -->
<!-- AdSense + Ad Placement API (H5 게임 광고: 전면/리워드). ?adtest=1 로 접속하면 테스트 광고 모드 -->
<script>
  (function () {
    var s = document.createElement("script");
    s.async = true;
    s.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1057421991223781";
    s.crossOrigin = "anonymous";
    s.setAttribute("data-ad-frequency-hint", "60s");
    if (new URLSearchParams(location.search).has("adtest")) s.setAttribute("data-adbreak-test", "on");
    document.head.appendChild(s);
  })();
  window.adsbygoogle = window.adsbygoogle || [];
  function adBreak(o) { adsbygoogle.push(o); }
  function adConfig(o) { adsbygoogle.push(o); }
</script>
